<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <!-- Styles extracted to css/styles.css — HTML owns structure only -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="card">
  <div class="card-header">
    <p class="card-title">Stopwatch</p>
  </div>

  <div class="display-wrapper">
    <div class="time" id="display">
      00:00<span class="ms">.00</span>
    </div>
    <!-- Ambient state label: no modal needed, user always knows current state -->
    <div class="status-badge" id="status">Ready</div>
  </div>

  <div class="controls">
    <!-- onclick handlers removed — app.js attaches listeners via addEventListener -->
    <button class="btn btn-outline"   id="btn-reset">Reset</button>
    <button class="btn btn-primary"   id="btn-start">Start</button>
    <button class="btn btn-secondary" id="btn-lap" disabled>Lap</button>
  </div>

  <div class="lap-section">
    <div class="laps-header" id="laps-header">
      <span>Laps</span>
      <span class="laps-count" id="laps-count">0</span>
    </div>
    <div class="laps" id="laps"></div>
  </div>
</div>

<!-- type="module" defers execution and enables ES module import/export -->
<script type="module" src="js/app.js"></script>
</body>
</html>
